<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Nagri | My Profile</title>

<link rel="stylesheet" href="profile.css">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<!-- ================= HEADER ================= -->

<header class="header">

<div class="logo">
🍜 Food Nagri
</div>

<div class="header-right">

<button id="darkModeBtn">
🌙
</button>

</div>

</header>

<!-- ================= PROFILE ================= -->

<div class="profile-container">

<div class="profile-card">

<!-- Profile Photo -->

<div class="photo-box">

<img src="../photo/user.png"
id="profileImage">

<label for="profilePhoto" class="camera">

<i class="fa-solid fa-camera"></i>

</label>

<input
type="file"
id="profilePhoto"
accept="image/*"
hidden>

</div>

<h2 id="userName">
Loading...
</h2>

<p id="userEmail">
Loading...
</p>

</div>

<!-- ================= USER DETAILS ================= -->

<div class="details-card">

<h2>
Personal Information
</h2>

<div class="input-group">

<label>
Full Name
</label>

<input
type="text"
id="name">

</div>

<div class="input-group">

<label>
Phone Number
</label>

<input
type="text"
id="phone">

</div>

<div class="input-group">

<label>
Email
</label>

<input
type="email"
id="email"
readonly>

</div>

<div class="input-group">

<label>
Address
</label>

<textarea
id="address"></textarea>

</div>

<button id="saveBtn">

💾 Save Profile

</button>

</div>

<!-- ================= QUICK ACTIONS ================= -->

<div class="menu-card">

<h2>

Quick Menu

</h2>

<a href="xorders.html">

📦 Order History

</a>

<a href="xwishlist.html">

❤️ Wishlist

</a>

<a href="/About/contact.html">

📞 Contact Support

</a>

<a href="xsettings.html">

⚙ Settings

</a>

<button id="logoutBtn">

🚪 Logout

</button>

</div>

</div>

<!-- ================= ORDER HISTORY ================= -->

<section class="orders-section">

<h2>

📦 My Orders

</h2>

<div id="ordersContainer">

<!-- Orders Firebase se yahan show honge -->

</div>

</section>

<!-- ================= FOOTER ================= -->

<footer>

<p>

© 2026 Food Nagri

</p>

</footer>

<script type="module" src="profile.js"></script>

</body>
</html>
