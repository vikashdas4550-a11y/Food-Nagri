<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Nagri - Order Successful</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:420px;
    background:#fff;
    border-radius:15px;
    padding:35px;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,.15);
}

.check{
    width:100px;
    height:100px;
    background:#22c55e;
    color:white;
    font-size:55px;
    border-radius:50%;
    line-height:100px;
    margin:auto;
    animation:pop .6s ease;
}

@keyframes pop{
    0%{transform:scale(0);}
    100%{transform:scale(1);}
}

h1{
    color:#22c55e;
    margin-top:20px;
}

p{
    color:#666;
    margin-top:10px;
    line-height:25px;
}

.order-id{
    margin:20px 0;
    background:#fff3cd;
    padding:12px;
    border-radius:8px;
    font-weight:bold;
}

button{
    width:100%;
    padding:13px;
    margin-top:12px;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
}

.home{
    background:#ff5722;
    color:white;
}

.home:hover{
    background:#e64a19;
}

.order{
    background:#22c55e;
    color:white;
}

.order:hover{
    background:#16a34a;
}

.support{
    background:#3b82f6;
    color:white;
}

.support:hover{
    background:#2563eb;
}
</style>

</head>
<body>

<div class="container">

<div class="check">✓</div>

<h1>Order Confirmed!</h1>

<p>
Thank you for choosing <b>Food Nagri</b> 🍽️<br>
Your delicious food is being prepared.
</p>

<div class="order-id">
Order ID :
<span id="orderId"></span>
</div>

<button class="home" onclick="window.location.href='../index.html'">
🏠 Back to Home
</button>

<button class="order" onclick="window.location.href='checkout.html'">
🍔 Order Again
</button>

<button class="support" onclick="window.location.href='../About/contact.html'">
📞 Contact Support
</button>

</div>

<script>
const id = "FN" + Math.floor(Math.random()*1000000);
document.getElementById("orderId").innerHTML = id;
</script>

</body>
</html>
