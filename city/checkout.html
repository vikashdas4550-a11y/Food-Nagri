<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
}

.container{
    width:400px;
    margin:40px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

input,textarea,select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px ;
    margin:10px 0;
    background:#4a83ff;
    color:#fff;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

#total{
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}
</style>

</head>
<body>

<div class="container">

<h2>Checkout</h2>

<p id="total"></p>

<input type="text" id="name" placeholder="Full Name">

<input type="tel" id="phone" placeholder="Mobile Number">

<textarea id="address" placeholder="Delivery Address"></textarea>
<button type="button" id="locationBtn">
Use Current Location
</button>

<input type="text" id="city" placeholder="City">

<input type="text" id="pincode" placeholder="PIN Code">


<select id="payment">
<option value="Cash On Delivery">Cash On Delivery</option>
<option value="UPI">UPI</option>
</select>

<button onclick="placeOrder()">Place Order</button>

</div>


<script type="module" src="checkout.js"></script>
</body>
</html>
