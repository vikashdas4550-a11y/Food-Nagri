<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cart</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    margin:20px;
}

.cart-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:white;
    margin:15px 0;
    padding:15px;
    border-radius:10px;
}

.cart-item img{
    width:100px;
    height:100px;
    object-fit:cover;
    border-radius:10px;
}

button{
    padding:8px 15px;
    background:#ff6b4a;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

#total{
    font-size:25px;
    font-weight:bold;
    margin-top:20px;
}

</style>

</head>
<body>

<h1>My Cart</h1>

<div id="cart-container"></div>

<h2 id="total"></h2>

<a href="checkout.html">
<button>Proceed To Checkout</button>
</a>

<script src="cartpage.js"></script>
</body>
</html>
