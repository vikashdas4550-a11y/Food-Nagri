<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Page</title>

    <style>
        /* Reset */
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body Dark Mode */
        body{
            height: 100vh;
            background: linear-gradient(135deg, #0f0f0f, #1a1a2e, #16213e);
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Center Content */
        .container{
            text-align: center;
        }

        h1{
            font-size: 3rem;
            letter-spacing: 2px;
            color: #00f5d4;
        }

        p{
            margin-top: 10px;
            color: #aaa;
            font-size: 1.2rem;
        }

        /* Glow Effect */
        h1:hover{
            text-shadow: 0 0 20px #3e1c7f;
            transition: 0.3s;
        }
        .container a{
            text-decoration: none;
            /* color: #00f5d4; */
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html"><h1>NO RESTARANTS ARE CURRENTLY AVAILABLE !!🌧️☔😢</h1></a>
        
        
    </div>

</body>
</html>
